<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Snapshot — INFRA SalesPlay Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { max-width: 100%; background: #f0f2f5; }
    .reports-wrapper { max-width: 1100px; margin: 0 auto; padding: 0 16px 40px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; }
    .header h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .header a { color: rgba(255,255,255,.85); font-size: 13px; text-decoration: none; }

    /* Play selector */
    .play-selector { background: #fff; border-radius: 12px; padding: 20px; margin: 16px 0; box-shadow: 0 1px 3px rgba(0,0,0,.08); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .play-selector label { font-weight: 700; font-size: 14px; color: #333; }
    .play-selector select { font-size: 15px; padding: 8px 14px; border-radius: 8px; border: 1px solid #ccc; min-width: 280px; flex: 1; }

    /* Print button */
    .print-btn { padding: 8px 18px; border: 1px solid #0078d4; background: #fff; color: #0078d4; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .print-btn:hover { background: #0078d4; color: #fff; }
    .export-btn { padding: 8px 18px; border: 1px solid #16a34a; background: #fff; color: #16a34a; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .export-btn:hover { background: #16a34a; color: #fff; }

    /* Report sections */
    .report-section { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .report-section h2 { font-size: 16px; font-weight: 700; color: #333; margin: 0 0 16px; border-bottom: 2px solid #eee; padding-bottom: 8px; }
    .report-section h3 { font-size: 14px; font-weight: 600; color: #555; margin: 16px 0 8px; }

    /* Side-by-side split */
    .split-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .split-card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .split-card h2 { font-size: 15px; font-weight: 700; margin: 0 0 14px; padding-bottom: 8px; border-bottom: 2px solid #eee; }
    .split-card.card-green { border-top: 4px solid #107c10; }
    .split-card.card-red { border-top: 4px solid #d32f2f; }
    .split-card .card-total { margin-top: 12px; padding-top: 10px; border-top: 1px solid #eee; font-size: 14px; font-weight: 700; display: flex; justify-content: space-between; }
    .split-card .card-count { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
    .split-card .card-arr { font-size: 14px; color: #666; font-weight: 600; }

    /* KPI row */
    .kpi-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
    .kpi-box { flex: 1; min-width: 130px; background: #f8faff; border-radius: 10px; padding: 16px; text-align: center; }
    .kpi-box .kpi-value { font-size: 28px; font-weight: 800; color: #0078d4; }
    .kpi-box .kpi-label { font-size: 11px; color: #666; margin-top: 4px; font-weight: 600; text-transform: uppercase; }
    .kpi-box.green .kpi-value { color: #107c10; }
    .kpi-box.orange .kpi-value { color: #d97706; }
    .kpi-box.red .kpi-value { color: #d32f2f; }

    /* Tables */
    .report-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .report-table th { background: #f5f7fa; text-align: left; padding: 10px 12px; font-weight: 700; color: #555; border-bottom: 2px solid #e0e0e0; white-space: nowrap; }
    .report-table td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: top; }
    .report-table tr:hover { background: #f8faff; }
    .report-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    .report-table .money { text-align: right; font-variant-numeric: tabular-nums; color: #0078d4; font-weight: 600; }

    /* Outcome badges */
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge-interested { background: #e6f4ea; color: #107c10; }
    .badge-not-interested { background: #fce8e6; color: #d32f2f; }
    .badge-meeting { background: #e8f0fe; color: #1a73e8; }
    .badge-deal { background: #fef7e0; color: #d97706; }
    .badge-won { background: #c8e6c9; color: #2e7d32; }
    .badge-default { background: #f0f0f0; color: #555; }

    /* Horizontal bars */
    .h-bar { display: flex; align-items: center; margin: 6px 0; gap: 8px; }
    .h-bar-label { width: 150px; font-size: 12px; font-weight: 600; color: #555; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .h-bar-track { flex: 1; height: 22px; background: #eee; border-radius: 6px; overflow: hidden; }
    .h-bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 700; color: #fff; min-width: 24px; }
    .h-bar-value { font-size: 12px; font-weight: 700; color: #333; min-width: 36px; }

    /* Snapshot header */
    .snapshot-header { text-align: center; margin-bottom: 16px; }
    .snapshot-header h1 { font-size: 22px; font-weight: 800; color: #333; margin-bottom: 4px; }
    .snapshot-header .snapshot-date { font-size: 13px; color: #888; }

    /* Loading */
    .loading { text-align: center; padding: 60px; color: #888; font-size: 15px; }
    .loading::before { content: '⏳ '; }

    /* Screen states */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Print styles */
    @media print {
      body { background: #fff !important; }
      .header, .play-selector, .no-print { display: none !important; }
      .report-section, .split-card { box-shadow: none !important; border: 1px solid #ddd; page-break-inside: avoid; margin-bottom: 12px; padding: 16px; }
      .split-row { gap: 12px; }
      .split-card { border-top-width: 3px !important; }
      .snapshot-header { margin-top: 0; }
      .kpi-box { border: 1px solid #eee; }
    }

    @media (max-width: 768px) {
      .kpi-row { flex-direction: column; }
      .split-row { grid-template-columns: 1fr; }
      .h-bar-label { width: 90px; font-size: 11px; }
      .report-table { font-size: 12px; }
      .report-table th, .report-table td { padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>📊 Play Snapshot</h1>
    <a href="admin.html">← Back to Admin</a>
  </div>

  <!-- Login screen -->
  <div id="screen-login" class="screen active">
    <div style="text-align:center;padding:80px 20px;">
      <div style="font-size:48px;margin-bottom:16px;">📊</div>
      <h2 style="margin-bottom:12px;color:#333;">INFRA SalesPlay Snapshot</h2>
      <p style="color:#666;margin-bottom:24px;">Sign in to view play performance snapshots</p>
      <button id="btn-sign-in" style="padding:12px 32px;font-size:16px;font-weight:700;background:#0078d4;color:#fff;border:none;border-radius:10px;cursor:pointer;">Sign In with Microsoft</button>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="screen-loading" class="screen">
    <div class="loading">Loading report data…</div>
  </div>

  <!-- Reports screen -->
  <div id="screen-reports" class="screen">
    <div class="reports-wrapper">
      <!-- Play selector -->
      <div class="play-selector no-print">
        <label for="play-select">Select Play:</label>
        <select id="play-select"><option value="">Loading plays…</option></select>
        <button class="print-btn" onclick="window.print()">🖨️ Print / PDF</button>
        <button class="export-btn" id="btn-export-csv">📥 Export CSV</button>
      </div>

      <!-- Report content (populated by JS) -->
      <div id="report-content"></div>
    </div>
  </div>

  <!-- ===================== SCRIPTS ===================== -->
  <script src="msal-browser.js?v=4"></script>
  <script src="config.js?v=4"></script>
  <script src="msal-auth.js?v=4"></script>
  <script src="graph-api.js?v=4"></script>

  <script>
    let currentUser = null;
    let allPlays = [];
    let allAssignments = [];
    let currentPlayLogs = [];
    let currentPlayAssignments = [];

    // ─── Helpers ───
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function esc(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

    function outcomeBadge(outcome) {
      const o = (outcome || '').toLowerCase();
      if (o.includes('not interested')) return `<span class="badge badge-not-interested">${esc(outcome)}</span>`;
      if (o.includes('interested')) return `<span class="badge badge-interested">${esc(outcome)}</span>`;
      if (o.includes('meeting')) return `<span class="badge badge-meeting">${esc(outcome)}</span>`;
      if (o.includes('deal') || o.includes('opportunity')) return `<span class="badge badge-deal">${esc(outcome)}</span>`;
      if (o.includes('won')) return `<span class="badge badge-won">${esc(outcome)}</span>`;
      return `<span class="badge badge-default">${esc(outcome || '—')}</span>`;
    }

    function pct(n, d) { return d > 0 ? Math.round((n / d) * 100) : 0; }

    function fmtMoney(val) {
      const n = Number(String(val).replace(/[^0-9.-]/g, ''));
      if (!n && n !== 0) return '—';
      if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'K';
      return '$' + n.toLocaleString();
    }

    function parseArr(val) {
      if (!val) return 0;
      return Number(String(val).replace(/[$,\s]/g, '')) || 0;
    }

    function daysBetween(dateStr1, dateStr2) {
      const d1 = new Date(dateStr1), d2 = new Date(dateStr2);
      if (isNaN(d1) || isNaN(d2)) return null;
      return Math.floor((d2 - d1) / 86400000);
    }

    function horizontalBar(label, value, maxVal, color = '#0078d4', suffix = '') {
      const w = maxVal > 0 ? Math.max(2, (value / maxVal) * 100) : 0;
      return `<div class="h-bar">
        <div class="h-bar-label" title="${esc(label)}">${esc(label)}</div>
        <div class="h-bar-track"><div class="h-bar-fill" style="width:${w}%;background:${color};">${value > 0 && w > 15 ? value + suffix : ''}</div></div>
        <div class="h-bar-value">${value}${suffix}</div>
      </div>`;
    }

    // ─── Data Loading ───
    async function loadPlayData(playId) {
      const safePid = playId.replace(/[^a-z0-9]/gi, '_');
      try {
        const text = await getFileText(SP_ROOT + '/' + safePid + '_engagements.csv');
        currentPlayLogs = text ? parseCSV(text) : [];
      } catch (e) { currentPlayLogs = []; }
      currentPlayAssignments = allAssignments.filter(a => a.play_id === playId && a.active_flag !== false);
    }

    // ─── Build the full snapshot ───
    function renderSnapshot(playId) {
      const logs = currentPlayLogs;
      const assignments = currentPlayAssignments;
      const now = new Date();
      const playName = (allPlays.find(p => p.play_id === playId) || {}).play_name || playId;

      // ── Compute account-level data ──
      const accountMap = {};
      assignments.forEach(a => {
        const id = a.account_id || '';
        if (!id) return;
        if (!accountMap[id]) accountMap[id] = {
          id, name: a.account_name || id,
          rep: a.rep_name || a.rep_email || '—',
          repEmail: (a.rep_sso_login || a.rep_email || '').toLowerCase(),
          arr: parseArr(a.arr),
          arrRaw: a.arr || '',
          engagements: [], lastOutcome: null, lastDate: null, firstTouchDate: null
        };
      });
      logs.forEach(l => {
        const id = l.account_id || '';
        if (!accountMap[id]) accountMap[id] = {
          id, name: l.account_name || id, rep: l.rep_name || '—',
          repEmail: (l.rep_email || '').toLowerCase(),
          arr: 0, arrRaw: '',
          engagements: [], lastOutcome: null, lastDate: null, firstTouchDate: null
        };
        accountMap[id].engagements.push(l);
      });

      // Compute latest/first for each account
      const accounts = Object.values(accountMap);
      accounts.forEach(a => {
        if (a.engagements.length > 0) {
          const sorted = a.engagements.sort((x, y) => (y.submitted_at || '').localeCompare(x.submitted_at || ''));
          const latest = sorted[0];
          const earliest = sorted[sorted.length - 1];
          a.lastOutcome = latest.outcome || null;
          a.lastDate = latest.call_date || (latest.submitted_at || '').split('T')[0];
          a.firstTouchDate = earliest.call_date || (earliest.submitted_at || '').split('T')[0];
          a.lastReason = latest.reason_label || '';
          a.lastNotes = latest.notes || '';
        }
      });

      // Find play start date (earliest engagement across all accounts)
      const allDates = logs.map(l => l.call_date || (l.submitted_at || '').split('T')[0]).filter(Boolean).sort();
      const playStartDate = allDates.length > 0 ? allDates[0] : null;

      // ── KPI calculations ──
      const totalAccounts = accounts.length;
      const touchedAccounts = accounts.filter(a => a.engagements.length > 0);
      const untouchedAccounts = accounts.filter(a => a.engagements.length === 0);
      const contacted = touchedAccounts.length;
      const untouched = untouchedAccounts.length;
      const totalEngagements = logs.length;

      // Average days untouched
      let avgDaysUntouched = '—';
      if (playStartDate && untouchedAccounts.length > 0) {
        const days = daysBetween(playStartDate, now.toISOString().split('T')[0]);
        avgDaysUntouched = days !== null ? days : '—';
      }

      // Average days since last touch (for touched accounts)
      let avgDaysSinceTouch = '—';
      if (touchedAccounts.length > 0) {
        const today = now.toISOString().split('T')[0];
        const daysArr = touchedAccounts.map(a => daysBetween(a.lastDate, today)).filter(d => d !== null);
        if (daysArr.length > 0) avgDaysSinceTouch = Math.round(daysArr.reduce((s, d) => s + d, 0) / daysArr.length);
      }

      // Interested / Not Interested accounts (by latest outcome)
      const interestedAccounts = accounts.filter(a => a.lastOutcome && a.lastOutcome.toLowerCase().includes('interested') && !a.lastOutcome.toLowerCase().includes('not'));
      const notInterestedAccounts = accounts.filter(a => a.lastOutcome && a.lastOutcome.toLowerCase().includes('not interested'));

      // Total ARR at play
      const totalArr = accounts.reduce((s, a) => s + a.arr, 0);
      const interestedArr = interestedAccounts.reduce((s, a) => s + a.arr, 0);
      const notInterestedArr = notInterestedAccounts.reduce((s, a) => s + a.arr, 0);

      // ── Outcome distribution ──
      const outcomeCounts = {};
      logs.forEach(l => { const o = l.outcome || 'Unknown'; outcomeCounts[o] = (outcomeCounts[o] || 0) + 1; });
      const outcomesSorted = Object.entries(outcomeCounts).sort((a, b) => b[1] - a[1]);
      const maxOutcome = outcomesSorted.length > 0 ? outcomesSorted[0][1] : 1;
      const outcomeColors = { 'Interested': '#107c10', 'Not Interested': '#d32f2f', 'Meeting Booked': '#1a73e8', 'Active Deal': '#d97706', 'Closed Won': '#2e7d32' };

      // ── Reason breakdown — split by interested vs not interested ──
      const interestedReasons = {};
      const notInterestedReasons = {};
      logs.forEach(l => {
        const r = l.reason_label || '';
        if (!r) return;
        const o = (l.outcome || '').toLowerCase();
        if (o.includes('not interested')) {
          notInterestedReasons[r] = (notInterestedReasons[r] || 0) + 1;
        } else if (o.includes('interested')) {
          interestedReasons[r] = (interestedReasons[r] || 0) + 1;
        } else {
          // Other outcomes — group with interested reasons
          interestedReasons[r] = (interestedReasons[r] || 0) + 1;
        }
      });
      const intReasonsSorted = Object.entries(interestedReasons).sort((a, b) => b[1] - a[1]);
      const notIntReasonsSorted = Object.entries(notInterestedReasons).sort((a, b) => b[1] - a[1]);
      const maxIntReason = intReasonsSorted.length > 0 ? intReasonsSorted[0][1] : 1;
      const maxNotIntReason = notIntReasonsSorted.length > 0 ? notIntReasonsSorted[0][1] : 1;

      // ── Top 10 Interested by ARR ──
      const top10Interested = [...interestedAccounts].sort((a, b) => b.arr - a.arr).slice(0, 10);

      // ── Top 10 Not Interested by ARR ──
      const top10NotInterested = [...notInterestedAccounts].sort((a, b) => b.arr - a.arr).slice(0, 10);

      // ── Top reps by points (recalculated) ──
      const repData = {};
      logs.forEach(l => {
        const e = (l.rep_email || 'unknown').toLowerCase();
        const canonical = typeof _canonicalEmail === 'function' ? _canonicalEmail(e) : e;
        if (!repData[canonical]) repData[canonical] = { name: l.rep_name || e, points: 0, engagements: 0, accounts: new Set(), interested: 0, notInterested: 0 };
        if ((l.rep_name || '').length > (repData[canonical].name || '').length) repData[canonical].name = l.rep_name;
        repData[canonical].points += typeof _recalcPoints === 'function' ? _recalcPoints(l) : (Number(l.points_earned) || 0);
        repData[canonical].engagements++;
        if (l.account_id) repData[canonical].accounts.add(l.account_id);
        if ((l.outcome || '').toLowerCase().includes('interested') && !(l.outcome || '').toLowerCase().includes('not')) repData[canonical].interested++;
        if ((l.outcome || '').toLowerCase().includes('not interested')) repData[canonical].notInterested++;
      });
      const topReps = Object.values(repData).sort((a, b) => b.points - a.points).slice(0, 15);
      const maxRepPts = topReps.length > 0 ? topReps[0].points : 1;

      // ── Untouched accounts list ──
      const untouchedList = [...untouchedAccounts].sort((a, b) => b.arr - a.arr);

      // ══════ BUILD HTML ══════
      const html = `
        <div class="snapshot-header">
          <h1>${esc(playName)}</h1>
          <div class="snapshot-date">Snapshot as of ${now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
        </div>

        <!-- KPIs -->
        <div class="report-section">
          <h2>📈 Activity Summary</h2>
          <div class="kpi-row">
            <div class="kpi-box"><div class="kpi-value">${totalAccounts}</div><div class="kpi-label">Total Accounts</div></div>
            <div class="kpi-box green"><div class="kpi-value">${contacted}</div><div class="kpi-label">Contacted</div></div>
            <div class="kpi-box ${untouched > 0 ? 'red' : 'green'}"><div class="kpi-value">${untouched}</div><div class="kpi-label">Untouched</div></div>
            <div class="kpi-box"><div class="kpi-value">${totalEngagements}</div><div class="kpi-label">Total Touches</div></div>
          </div>
          <div class="kpi-row">
            <div class="kpi-box ${typeof avgDaysUntouched === 'number' && avgDaysUntouched > 14 ? 'red' : 'orange'}"><div class="kpi-value">${avgDaysUntouched}</div><div class="kpi-label">Avg Days Untouched</div></div>
            <div class="kpi-box"><div class="kpi-value">${avgDaysSinceTouch}</div><div class="kpi-label">Avg Days Since Touch</div></div>
            <div class="kpi-box"><div class="kpi-value">${fmtMoney(totalArr)}</div><div class="kpi-label">Total ARR at Play</div></div>
            <div class="kpi-box green"><div class="kpi-value">${fmtMoney(interestedArr)}</div><div class="kpi-label">Interested ARR</div></div>
            <div class="kpi-box red"><div class="kpi-value">${fmtMoney(notInterestedArr)}</div><div class="kpi-label">Not Interested ARR</div></div>
          </div>
        </div>

        <!-- Outcome Distribution -->
        <div class="report-section">
          <h2>📊 Outcome Distribution</h2>
          ${outcomesSorted.length > 0
            ? outcomesSorted.map(([o, c]) => horizontalBar(o, c, maxOutcome, outcomeColors[o] || '#888')).join('')
            : '<p style="color:#888;">No engagement data yet.</p>'}
        </div>

        <!-- Top 10 Interested & Not Interested — side by side -->
        <div class="split-row">
          <div class="split-card card-green">
            <h2 style="color:#107c10;">✅ Top Interested by ARR</h2>
            <div style="display:flex;gap:16px;margin-bottom:14px;">
              <div><div class="card-count" style="color:#107c10;">${interestedAccounts.length}</div><div class="card-arr">accounts · ${fmtMoney(interestedArr)}</div></div>
            </div>
            ${top10Interested.length > 0 ? `
              <table class="report-table" style="font-size:12px;">
                <tr><th>Account</th><th>Rep</th><th class="money">ARR</th><th>Reason</th></tr>
                ${top10Interested.map(a => `<tr>
                  <td><strong>${esc(a.name)}</strong></td>
                  <td style="font-size:11px;">${esc(a.rep)}</td>
                  <td class="money">${fmtMoney(a.arr)}</td>
                  <td style="font-size:11px;">${esc(a.lastReason || '—')}</td>
                </tr>`).join('')}
              </table>
            ` : '<p style="color:#888;font-size:13px;">No interested accounts yet.</p>'}
          </div>
          <div class="split-card card-red">
            <h2 style="color:#d32f2f;">❌ Top Not Interested by ARR</h2>
            <div style="display:flex;gap:16px;margin-bottom:14px;">
              <div><div class="card-count" style="color:#d32f2f;">${notInterestedAccounts.length}</div><div class="card-arr">accounts · ${fmtMoney(notInterestedArr)}</div></div>
            </div>
            ${top10NotInterested.length > 0 ? `
              <table class="report-table" style="font-size:12px;">
                <tr><th>Account</th><th>Rep</th><th class="money">ARR</th><th>Reason</th></tr>
                ${top10NotInterested.map(a => `<tr>
                  <td><strong>${esc(a.name)}</strong></td>
                  <td style="font-size:11px;">${esc(a.rep)}</td>
                  <td class="money">${fmtMoney(a.arr)}</td>
                  <td style="font-size:11px;">${esc(a.lastReason || '—')}</td>
                </tr>`).join('')}
              </table>
            ` : '<p style="color:#888;font-size:13px;">No not-interested accounts yet.</p>'}
          </div>
        </div>

        <!-- Top Reps by Points -->
        <div class="report-section">
          <h2>🏆 Top Reps by Points</h2>
          ${topReps.length > 0 ? `
            <table class="report-table">
              <tr><th>#</th><th>Rep</th><th class="num">Points</th><th class="num">Touches</th><th class="num">Accounts</th><th class="num">Interested</th><th class="num">Not Interested</th></tr>
              ${topReps.map((r, i) => `<tr>
                <td>${i + 1}</td>
                <td><strong>${esc(r.name)}</strong></td>
                <td class="num"><strong>${r.points}</strong></td>
                <td class="num">${r.engagements}</td>
                <td class="num">${r.accounts.size}</td>
                <td class="num" style="color:#107c10;">${r.interested}</td>
                <td class="num" style="color:#d32f2f;">${r.notInterested}</td>
              </tr>`).join('')}
            </table>
          ` : '<p style="color:#888;">No engagement data yet.</p>'}
        </div>

        <!-- Untouched Accounts -->
        ${untouchedList.length > 0 ? `
        <div class="report-section">
          <h2>⚠️ Untouched Accounts (${untouched})</h2>
          <p style="font-size:13px;color:#888;margin-bottom:12px;">Assigned but never contacted — sorted by ARR${playStartDate ? '. Play active since ' + playStartDate : ''}.</p>
          <table class="report-table">
            <tr><th>#</th><th>Account</th><th>Assigned Rep</th><th class="money">ARR</th><th class="num">Days Waiting</th></tr>
            ${untouchedList.slice(0, 30).map((a, i) => {
              const daysWaiting = playStartDate ? daysBetween(playStartDate, now.toISOString().split('T')[0]) : '—';
              return `<tr>
                <td>${i + 1}</td>
                <td><strong>${esc(a.name)}</strong></td>
                <td>${esc(a.rep)}</td>
                <td class="money">${fmtMoney(a.arr)}</td>
                <td class="num" style="color:${typeof daysWaiting === 'number' && daysWaiting > 14 ? '#d32f2f' : '#d97706'};">${daysWaiting}</td>
              </tr>`;
            }).join('')}
          </table>
          ${untouchedList.length > 30 ? `<p style="font-size:12px;color:#888;margin-top:8px;">Showing top 30 of ${untouchedList.length}.</p>` : ''}
        </div>` : ''}

        <!-- Reason Breakdown — split by outcome, side by side -->
        <div class="split-row">
          <div class="split-card card-green">
            <h2 style="color:#107c10;">💬 Interested — Why They Said Yes</h2>
            ${intReasonsSorted.length > 0
              ? intReasonsSorted.map(([r, c]) => horizontalBar(r, c, maxIntReason, '#107c10')).join('')
              : '<p style="color:#888;font-size:13px;">No reasons recorded.</p>'}
          </div>
          <div class="split-card card-red">
            <h2 style="color:#d32f2f;">💬 Not Interested — Why They Said No</h2>
            ${notIntReasonsSorted.length > 0
              ? notIntReasonsSorted.map(([r, c]) => horizontalBar(r, c, maxNotIntReason, '#d32f2f')).join('')
              : '<p style="color:#888;font-size:13px;">No reasons recorded.</p>'}
          </div>
        </div>
      `;

      document.getElementById('report-content').innerHTML = html;
    }

    // ─── CSV Export ───
    function exportCSV() {
      const playSelect = document.getElementById('play-select');
      const playName = playSelect.options[playSelect.selectedIndex]?.text || 'report';
      const logs = currentPlayLogs;
      const rows = [['Date', 'Rep', 'Account', 'Outcome', 'Reason', 'Notes', 'ARR']];

      // Build account ARR lookup from assignments
      const arrLookup = {};
      currentPlayAssignments.forEach(a => { if (a.account_id) arrLookup[a.account_id] = a.arr || ''; });

      logs.sort((a, b) => (b.submitted_at || '').localeCompare(a.submitted_at || '')).forEach(l => {
        rows.push([
          (l.call_date || l.submitted_at || '').split('T')[0],
          l.rep_name || l.rep_email,
          l.account_name || l.account_id,
          l.outcome,
          l.reason_label || '',
          l.notes || '',
          arrLookup[l.account_id] || ''
        ]);
      });

      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${playName.replace(/[^a-z0-9]/gi, '_')}_snapshot.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ─── Init ───
    async function loadReports() {
      showScreen('screen-loading');
      allPlays = await getPlays();
      const assText = await getFileText(SP_ROOT + '/assignments.json');
      allAssignments = assText ? (JSON.parse(assText).assignments || []).filter(a => a.active_flag !== false) : [];

      const sel = document.getElementById('play-select');
      sel.innerHTML = allPlays.map(p => `<option value="${p.play_id}">${p.play_name || p.play_id}</option>`).join('');

      if (allPlays.length > 0) {
        await loadPlayData(allPlays[0].play_id);
        renderSnapshot(allPlays[0].play_id);
      }
      showScreen('screen-reports');
    }

    // ─── Event Listeners ───
    document.getElementById('btn-sign-in').addEventListener('click', async () => {
      try {
        const account = await signIn();
        if (account) {
          currentUser = getCurrentUser();
          await loadReports();
        }
      } catch (err) {
        console.error('Sign in error:', err);
        if (err && err.message) alert('⚠️ Sign in failed.\n\n' + err.message);
      }
    });

    document.getElementById('play-select').addEventListener('change', async function () {
      if (!this.value) return;
      showScreen('screen-loading');
      await loadPlayData(this.value);
      renderSnapshot(this.value);
      showScreen('screen-reports');
    });

    document.getElementById('btn-export-csv').addEventListener('click', exportCSV);

    // Auto-init
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await initAuth();
        const user = getCurrentUser();
        if (user) {
          currentUser = user;
          await loadReports();
        } else {
          showScreen('screen-login');
        }
      } catch (err) {
        console.error('Init error:', err);
        showScreen('screen-login');
      }
    });
  </script>
</body>
</html>
