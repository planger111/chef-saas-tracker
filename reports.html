<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Snapshot — INFRA SalesPlay Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --slate-50:#f8fafc; --slate-100:#f1f5f9; --slate-200:#e2e8f0; --slate-300:#cbd5e1;
      --slate-400:#94a3b8; --slate-500:#64748b; --slate-600:#475569; --slate-700:#334155;
      --slate-800:#1e293b; --slate-900:#0f172a;
      --green-50:#f0fdf4; --green-100:#dcfce7; --green-600:#16a34a; --green-700:#15803d;
      --red-50:#fef2f2; --red-100:#fee2e2; --red-600:#dc2626; --red-700:#b91c1c;
      --blue-50:#eff6ff; --blue-500:#3b82f6; --blue-600:#2563eb;
      --amber-50:#fffbeb; --amber-500:#f59e0b; --amber-600:#d97706;
      --radius:12px; --radius-sm:8px;
      --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
      --shadow-md:0 4px 6px rgba(0,0,0,0.04),0 2px 4px rgba(0,0,0,0.03);
    }
    *{box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--slate-50);color:var(--slate-800);-webkit-font-smoothing:antialiased;max-width:100%;}
    .reports-wrapper{max-width:1120px;margin:0 auto;padding:0 20px 60px;}

    /* Header */
    .header{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#2563eb 100%);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
    .header h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.01em;}
    .header a{color:rgba(255,255,255,0.75);font-size:13px;text-decoration:none;transition:color .15s;}
    .header a:hover{color:#fff;}

    /* Play selector bar */
    .play-bar{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius);padding:16px 20px;margin:20px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:var(--shadow);}
    .play-bar label{font-weight:600;font-size:13px;color:var(--slate-500);text-transform:uppercase;letter-spacing:0.04em;}
    .play-bar select{font-size:15px;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--slate-300);min-width:280px;flex:1;color:var(--slate-800);background:var(--slate-50);transition:border-color .15s;}
    .play-bar select:focus{outline:none;border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(59,130,246,0.12);}

    /* Buttons */
    .btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid;}
    .btn-print{border-color:var(--slate-300);background:#fff;color:var(--slate-600);}
    .btn-print:hover{background:var(--slate-50);border-color:var(--slate-400);}
    .btn-export{border-color:var(--green-600);background:#fff;color:var(--green-700);}
    .btn-export:hover{background:var(--green-50);}

    /* Snapshot title */
    .snap-title{text-align:center;margin:8px 0 24px;}
    .snap-title h1{font-size:26px;font-weight:800;color:var(--slate-900);letter-spacing:-0.02em;margin:0 0 4px;}
    .snap-title .snap-date{font-size:13px;color:var(--slate-400);font-weight:500;}

    /* Coverage hero */
    .coverage-hero{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius);padding:24px 28px;margin-bottom:16px;box-shadow:var(--shadow);}
    .coverage-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
    .coverage-top span:first-child{font-size:14px;font-weight:700;color:var(--slate-700);}
    .coverage-top .coverage-pct{font-size:32px;font-weight:800;color:var(--blue-600);letter-spacing:-0.02em;}
    .coverage-track{height:14px;background:var(--slate-100);border-radius:7px;overflow:hidden;}
    .coverage-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,#3b82f6,#2563eb);transition:width .6s ease;}
    .coverage-meta{display:flex;gap:28px;margin-top:14px;font-size:13px;color:var(--slate-500);}
    .coverage-meta strong{color:var(--slate-800);font-weight:700;}

    /* Card */
    .card{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);}
    .card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--slate-100);}
    .card-hdr h2{font-size:15px;font-weight:700;color:var(--slate-800);margin:0;}
    .card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

    /* KPI grid */
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
    .kpi{text-align:center;padding:18px 10px;border-radius:var(--radius-sm);background:var(--slate-50);border:1px solid var(--slate-100);}
    .kpi .kv{font-size:28px;font-weight:800;letter-spacing:-0.02em;color:var(--slate-800);}
    .kpi .kl{font-size:10px;color:var(--slate-500);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;}
    .kpi.kg .kv{color:var(--green-600);} .kpi.kr .kv{color:var(--red-600);}
    .kpi.kb .kv{color:var(--blue-600);} .kpi.ka .kv{color:var(--amber-600);}

    /* Split layout */
    .split{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
    .scard{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
    .scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
    .scard.sg::before{background:linear-gradient(90deg,#16a34a,#4ade80);}
    .scard.sr::before{background:linear-gradient(90deg,#dc2626,#f87171);}
    .scard .sc-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:14px;}
    .scard.sg .sc-pill{background:var(--green-50);color:var(--green-700);}
    .scard.sr .sc-pill{background:var(--red-50);color:var(--red-700);}
    .sc-stats{display:flex;gap:24px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--slate-100);}
    .sc-stat{text-align:center;}
    .sc-stat .sv{font-size:30px;font-weight:800;letter-spacing:-0.02em;}
    .sc-stat .sl{font-size:10px;color:var(--slate-500);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
    .scard.sg .sv{color:var(--green-600);} .scard.sr .sv{color:var(--red-600);}

    /* Tables */
    .tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;}
    .tbl thead th{background:var(--slate-50);text-align:left;padding:10px 12px;font-weight:700;color:var(--slate-500);font-size:11px;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--slate-200);}
    .tbl tbody td{padding:10px 12px;border-bottom:1px solid var(--slate-100);color:var(--slate-700);}
    .tbl tbody tr:last-child td{border-bottom:none;}
    .tbl tbody tr:hover td{background:var(--slate-50);}
    .tbl .r{text-align:right;font-variant-numeric:tabular-nums;}
    .tbl .money{text-align:right;font-variant-numeric:tabular-nums;color:var(--blue-600);font-weight:600;}
    .tbl .rk{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--slate-100);color:var(--slate-600);}
    .tbl .rk-1{background:#fef3c7;color:#92400e;} .tbl .rk-2{background:var(--slate-100);color:var(--slate-600);} .tbl .rk-3{background:#fed7aa;color:#9a3412;}

    /* Bars */
    .bar-row{display:flex;align-items:center;padding:5px 0;gap:10px;}
    .bar-row+.bar-row{border-top:1px solid var(--slate-50);}
    .bar-lbl{width:140px;font-size:13px;font-weight:500;color:var(--slate-600);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
    .bar-track{flex:1;height:24px;background:var(--slate-100);border-radius:6px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;color:#fff;min-width:28px;transition:width .4s ease;}
    .bar-ct{min-width:32px;font-size:13px;font-weight:700;color:var(--slate-700);text-align:right;}

    /* Pill badges */
    .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
    .pill-g{background:var(--green-50);color:var(--green-700);}
    .pill-r{background:var(--red-50);color:var(--red-700);}

    /* Misc */
    .empty{text-align:center;padding:24px;color:var(--slate-400);font-size:13px;font-style:italic;}
    .screen{display:none;} .screen.active{display:block;}
    .loading{text-align:center;padding:80px 20px;color:var(--slate-400);font-size:15px;}

    /* Print */
    @media print{
      body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      .header,.play-bar,.no-print{display:none!important;}
      .card,.scard,.coverage-hero{box-shadow:none!important;border:1px solid #ddd;page-break-inside:avoid;margin-bottom:10px;padding:16px;}
      .split{gap:10px;} .snap-title{margin-top:0;} .kpi{border:1px solid #eee;}
    }
    @media(max-width:768px){
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .split{grid-template-columns:1fr;}
      .bar-lbl{width:100px;font-size:12px;}
      .tbl{font-size:12px;} .tbl thead th,.tbl tbody td{padding:8px 6px;}
      .coverage-meta{flex-wrap:wrap;gap:12px;}
      .sc-stats{gap:16px;}
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>📊 Play Snapshot</h1>
    <a href="admin.html">← Back to Admin</a>
  </div>

  <!-- Login screen -->
  <div id="screen-login" class="screen active">
    <div style="text-align:center;padding:100px 20px;">
      <div style="width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#0f172a,#2563eb);display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px;">📊</div>
      <h2 style="margin-bottom:8px;color:var(--slate-900);font-size:22px;font-weight:800;">INFRA SalesPlay Snapshot</h2>
      <p style="color:var(--slate-500);margin-bottom:28px;font-size:15px;">Sign in to view play performance snapshots</p>
      <button id="btn-sign-in" style="padding:12px 36px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;border:none;border-radius:10px;cursor:pointer;">Sign In with Microsoft</button>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="screen-loading" class="screen">
    <div class="loading">⏳ Loading report data…</div>
  </div>

  <!-- Reports screen -->
  <div id="screen-reports" class="screen">
    <div class="reports-wrapper">
      <!-- Play selector -->
      <div class="play-bar no-print">
        <label for="play-select">Play</label>
        <select id="play-select"><option value="">Loading plays…</option></select>
        <button class="btn btn-print" onclick="window.print()">🖨️ Print / PDF</button>
        <button class="btn btn-export" id="btn-export-csv">📥 Export CSV</button>
      </div>

      <!-- Report content (populated by JS) -->
      <div id="report-content"></div>
    </div>
  </div>

  <!-- ===================== SCRIPTS ===================== -->
  <script src="msal-browser.js?v=5"></script>
  <script src="config.js?v=5"></script>
  <script src="msal-auth.js?v=12"></script>
  <script src="graph-api.js?v=11"></script>

  <script>
    let currentUser = null;
    let allPlays = [];
    let allAssignments = [];
    let currentPlayLogs = [];
    let currentPlayAssignments = [];

    // ─── Helpers ───
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function esc(s) { const el = document.createElement('span'); el.textContent = s; return el.innerHTML; }

    function outcomeBadge(outcome) {
      const o = (outcome || '').toLowerCase();
      if (o.includes('would not engage')) return `<span class="badge badge-wne">${esc(outcome)}</span>`;
      if (o.includes('not interested')) return `<span class="badge badge-not-interested">${esc(outcome)}</span>`;
      if (o.includes('interested')) return `<span class="badge badge-interested">${esc(outcome)}</span>`;
      if (o.includes('meeting')) return `<span class="badge badge-meeting">${esc(outcome)}</span>`;
      if (o.includes('deal') || o.includes('opportunity')) return `<span class="badge badge-deal">${esc(outcome)}</span>`;
      if (o.includes('won')) return `<span class="badge badge-won">${esc(outcome)}</span>`;
      return `<span class="badge badge-default">${esc(outcome || '—')}</span>`;
    }

    function pct(n, d) { return d > 0 ? Math.round((n / d) * 100) : 0; }

    function fmtMoney(val) {
      const n = Number(String(val).replace(/[^0-9.-]/g, ''));
      if (!n && n !== 0) return '—';
      if (n >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'K';
      return '$' + n.toLocaleString();
    }

    function parseArr(val) {
      if (!val) return 0;
      return Number(String(val).replace(/[$,\s]/g, '')) || 0;
    }

    function daysBetween(dateStr1, dateStr2) {
      const d1 = new Date(dateStr1), d2 = new Date(dateStr2);
      if (isNaN(d1) || isNaN(d2)) return null;
      return Math.floor((d2 - d1) / 86400000);
    }

    function horizontalBar(label, value, maxVal, color = '#0078d4', suffix = '') {
      const w = maxVal > 0 ? Math.max(2, (value / maxVal) * 100) : 0;
      return `<div class="h-bar">
        <div class="h-bar-label" title="${esc(label)}">${esc(label)}</div>
        <div class="h-bar-track"><div class="h-bar-fill" style="width:${w}%;background:${color};">${value > 0 && w > 15 ? value + suffix : ''}</div></div>
        <div class="h-bar-value">${value}${suffix}</div>
      </div>`;
    }

    // ─── Data Loading ───
    async function loadPlayData(playId) {
      const safePid = playId.replace(/[^a-z0-9]/gi, '_');
      try {
        const text = await getFileText(SP_ROOT + '/' + safePid + '_engagements.csv');
        currentPlayLogs = text ? parseCSV(text) : [];
      } catch (e) { currentPlayLogs = []; }
      currentPlayAssignments = allAssignments.filter(a => a.play_id === playId && a.active_flag !== false);
    }

    // ─── Build the full snapshot ───
    function renderSnapshot(playId) {
      const logs = currentPlayLogs;
      const assignments = currentPlayAssignments;
      const now = new Date();
      const playName = (allPlays.find(p => p.play_id === playId) || {}).play_name || playId;

      // ── Compute account-level data ──
      const accountMap = {};
      assignments.forEach(a => {
        const id = a.account_id || '';
        if (!id) return;
        if (!accountMap[id]) accountMap[id] = {
          id, name: a.account_name || id,
          rep: a.rep_name || a.rep_email || '—',
          repEmail: (a.rep_sso_login || a.rep_email || '').toLowerCase(),
          arr: parseArr(a.arr),
          arrRaw: a.arr || '',
          engagements: [], lastOutcome: null, lastDate: null, firstTouchDate: null
        };
      });
      logs.forEach(l => {
        const id = l.account_id || '';
        if (!accountMap[id]) accountMap[id] = {
          id, name: l.account_name || id, rep: l.rep_name || '—',
          repEmail: (l.rep_email || '').toLowerCase(),
          arr: 0, arrRaw: '',
          engagements: [], lastOutcome: null, lastDate: null, firstTouchDate: null
        };
        accountMap[id].engagements.push(l);
      });

      // Compute latest/first for each account
      const accounts = Object.values(accountMap);
      accounts.forEach(a => {
        if (a.engagements.length > 0) {
          const sorted = a.engagements.sort((x, y) => (y.submitted_at || '').localeCompare(x.submitted_at || ''));
          const latest = sorted[0];
          const earliest = sorted[sorted.length - 1];
          a.lastOutcome = latest.outcome || null;
          a.lastDate = latest.call_date || (latest.submitted_at || '').split('T')[0];
          a.firstTouchDate = earliest.call_date || (earliest.submitted_at || '').split('T')[0];
          a.lastReason = latest.reason_label || '';
          a.lastNotes = latest.notes || '';
        }
      });

      // Find play start date (earliest engagement across all accounts)
      const allDates = logs.map(l => l.call_date || (l.submitted_at || '').split('T')[0]).filter(Boolean).sort();
      const playStartDate = allDates.length > 0 ? allDates[0] : null;

      // ── KPI calculations ──
      const totalAccounts = accounts.length;
      const touchedAccounts = accounts.filter(a => a.engagements.length > 0);
      const untouchedAccounts = accounts.filter(a => a.engagements.length === 0);
      const contacted = touchedAccounts.length;
      const untouched = untouchedAccounts.length;
      const totalEngagements = logs.length;

      // Average days untouched
      let avgDaysUntouched = '—';
      if (playStartDate && untouchedAccounts.length > 0) {
        const days = daysBetween(playStartDate, now.toISOString().split('T')[0]);
        avgDaysUntouched = days !== null ? days : '—';
      }

      // Average days since last touch (for touched accounts)
      let avgDaysSinceTouch = '—';
      if (touchedAccounts.length > 0) {
        const today = now.toISOString().split('T')[0];
        const daysArr = touchedAccounts.map(a => daysBetween(a.lastDate, today)).filter(d => d !== null);
        if (daysArr.length > 0) avgDaysSinceTouch = Math.round(daysArr.reduce((s, d) => s + d, 0) / daysArr.length);
      }

      // Interested / Not Interested / Would Not Engage accounts (by latest outcome)
      const interestedAccounts = accounts.filter(a => a.lastOutcome && a.lastOutcome.toLowerCase().includes('interested') && !a.lastOutcome.toLowerCase().includes('not'));
      const notInterestedAccounts = accounts.filter(a => a.lastOutcome && a.lastOutcome === 'Not Interested');
      const wneAccounts = accounts.filter(a => a.lastOutcome && a.lastOutcome === 'Would Not Engage');

      // Total ARR at play
      const totalArr = accounts.reduce((s, a) => s + a.arr, 0);
      const interestedArr = interestedAccounts.reduce((s, a) => s + a.arr, 0);
      const notInterestedArr = notInterestedAccounts.reduce((s, a) => s + a.arr, 0);
      const wneArr = wneAccounts.reduce((s, a) => s + a.arr, 0);

      // ── Outcome distribution ──
      const outcomeCounts = {};
      logs.forEach(l => { const o = l.outcome || 'Unknown'; outcomeCounts[o] = (outcomeCounts[o] || 0) + 1; });
      const outcomesSorted = Object.entries(outcomeCounts).sort((a, b) => b[1] - a[1]);
      const maxOutcome = outcomesSorted.length > 0 ? outcomesSorted[0][1] : 1;
      const outcomeColors = { 'Interested': '#107c10', 'Not Interested': '#d32f2f', 'Would Not Engage': '#f57c00', 'Meeting Booked': '#1a73e8', 'Active Deal': '#d97706', 'Closed Won': '#2e7d32' };

      // ── Reason breakdown — split by interested vs not interested vs WNE ──
      const interestedReasons = {};
      const notInterestedReasons = {};
      const wneReasons = {};
      logs.forEach(l => {
        const r = l.reason_label || '';
        if (!r) return;
        const o = (l.outcome || '');
        if (o === 'Would Not Engage') {
          wneReasons[r] = (wneReasons[r] || 0) + 1;
        } else if (o === 'Not Interested') {
          notInterestedReasons[r] = (notInterestedReasons[r] || 0) + 1;
        } else if (o.includes('Interested')) {
          interestedReasons[r] = (interestedReasons[r] || 0) + 1;
        } else {
          interestedReasons[r] = (interestedReasons[r] || 0) + 1;
        }
      });
      const intReasonsSorted = Object.entries(interestedReasons).sort((a, b) => b[1] - a[1]);
      const notIntReasonsSorted = Object.entries(notInterestedReasons).sort((a, b) => b[1] - a[1]);
      const wneReasonsSorted = Object.entries(wneReasons).sort((a, b) => b[1] - a[1]);
      const maxIntReason = intReasonsSorted.length > 0 ? intReasonsSorted[0][1] : 1;
      const maxNotIntReason = notIntReasonsSorted.length > 0 ? notIntReasonsSorted[0][1] : 1;
      const maxWneReason = wneReasonsSorted.length > 0 ? wneReasonsSorted[0][1] : 1;

      // ── Top 10 Interested by ARR ──
      const top10Interested = [...interestedAccounts].sort((a, b) => b.arr - a.arr).slice(0, 10);

      // ── Top 10 Not Interested by ARR ──
      const top10NotInterested = [...notInterestedAccounts].sort((a, b) => b.arr - a.arr).slice(0, 10);

      // ── Top reps by points (recalculated) ──
      const repData = {};
      logs.forEach(l => {
        const e = (l.rep_email || 'unknown').toLowerCase();
        const canonical = typeof _canonicalEmail === 'function' ? _canonicalEmail(e) : e;
        if (!repData[canonical]) repData[canonical] = { name: l.rep_name || e, points: 0, engagements: 0, accounts: new Set(), interested: 0, notInterested: 0, wouldNotEngage: 0 };
        if ((l.rep_name || '').length > (repData[canonical].name || '').length) repData[canonical].name = l.rep_name;
        repData[canonical].points += typeof _recalcPoints === 'function' ? _recalcPoints(l) : (Number(l.points_earned) || 0);
        repData[canonical].engagements++;
        if (l.account_id) repData[canonical].accounts.add(l.account_id);
        if (l.outcome === 'Interested') repData[canonical].interested++;
        if (l.outcome === 'Not Interested') repData[canonical].notInterested++;
        if (l.outcome === 'Would Not Engage') repData[canonical].wouldNotEngage++;
      });
      const topReps = Object.values(repData).sort((a, b) => b.points - a.points).slice(0, 15);
      const maxRepPts = topReps.length > 0 ? topReps[0].points : 1;

      // ── Untouched accounts list ──
      const untouchedList = [...untouchedAccounts].sort((a, b) => b.arr - a.arr);

      // ══════ BUILD HTML ══════
      const coveragePct = totalAccounts > 0 ? Math.round((contacted / totalAccounts) * 100) : 0;

      function bar(label, value, maxVal, color) {
        const w = maxVal > 0 ? Math.max(3, (value / maxVal) * 100) : 0;
        return `<div class="bar-row">
          <div class="bar-lbl" title="${esc(label)}">${esc(label)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${color};">${value > 0 && w > 18 ? value : ''}</div></div>
          <div class="bar-ct">${value}</div>
        </div>`;
      }

      const html = `
        <div class="snap-title">
          <h1>${esc(playName)}</h1>
          <div class="snap-date">Snapshot · ${now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
        </div>

        <!-- Coverage Hero -->
        <div class="coverage-hero">
          <div class="coverage-top">
            <span>Account Coverage</span>
            <span class="coverage-pct">${coveragePct}%</span>
          </div>
          <div class="coverage-track"><div class="coverage-fill" style="width:${coveragePct}%"></div></div>
          <div class="coverage-meta">
            <span><strong>${contacted}</strong> contacted</span>
            <span><strong>${untouched}</strong> untouched</span>
            <span><strong>${totalAccounts}</strong> total accounts</span>
            <span><strong>${totalEngagements}</strong> total touches</span>
          </div>
        </div>

        <!-- KPIs -->
        <div class="card">
          <div class="kpi-grid">
            <div class="kpi kb"><div class="kv">${fmtMoney(totalArr)}</div><div class="kl">Total ARR</div></div>
            <div class="kpi kg"><div class="kv">${fmtMoney(interestedArr)}</div><div class="kl">Interested ARR</div></div>
            <div class="kpi kr"><div class="kv">${fmtMoney(notInterestedArr)}</div><div class="kl">Not Interested ARR</div></div>
            <div class="kpi" style="border-left-color:#f57c00;"><div class="kv">${fmtMoney(wneArr)}</div><div class="kl">Would Not Engage ARR</div></div>
            <div class="kpi ${typeof avgDaysUntouched === 'number' && avgDaysUntouched > 14 ? 'kr' : 'ka'}"><div class="kv">${avgDaysUntouched}</div><div class="kl">Avg Days Untouched</div></div>
            <div class="kpi"><div class="kv">${avgDaysSinceTouch}</div><div class="kl">Avg Days Since Touch</div></div>
          </div>
        </div>

        <!-- Interested & Not Interested — stacked -->
        <div class="split" style="grid-template-columns:1fr;">
          <div class="scard sg">
            <div class="sc-pill">✓ Interested</div>
            <div class="sc-stats">
              <div class="sc-stat"><div class="sv">${interestedAccounts.length}</div><div class="sl">Accounts</div></div>
              <div class="sc-stat"><div class="sv">${fmtMoney(interestedArr)}</div><div class="sl">Total ARR</div></div>
              <div class="sc-stat"><div class="sv">${pct(interestedAccounts.length, totalAccounts)}%</div><div class="sl">of Total</div></div>
            </div>
            ${top10Interested.length > 0 ? `
              <table class="tbl">
                <thead><tr><th></th><th>Account</th><th>Rep</th><th class="money">ARR</th><th>Reason</th></tr></thead>
                <tbody>${top10Interested.map((a, i) => `<tr>
                  <td><span class="rk ${i < 3 ? 'rk-' + (i+1) : ''}">${i+1}</span></td>
                  <td><strong>${esc(a.name)}</strong></td>
                  <td style="font-size:12px;color:var(--slate-500);">${esc(a.rep)}</td>
                  <td class="money">${fmtMoney(a.arr)}</td>
                  <td><span class="pill pill-g">${esc(a.lastReason || '—')}</span></td>
                </tr>`).join('')}</tbody>
              </table>
            ` : '<div class="empty">No interested accounts yet</div>'}
          </div>
          <div class="scard sr">
            <div class="sc-pill">✗ Not Interested</div>
            <div class="sc-stats">
              <div class="sc-stat"><div class="sv">${notInterestedAccounts.length}</div><div class="sl">Accounts</div></div>
              <div class="sc-stat"><div class="sv">${fmtMoney(notInterestedArr)}</div><div class="sl">Total ARR</div></div>
              <div class="sc-stat"><div class="sv">${pct(notInterestedAccounts.length, totalAccounts)}%</div><div class="sl">of Total</div></div>
            </div>
            ${top10NotInterested.length > 0 ? `
              <table class="tbl">
                <thead><tr><th></th><th>Account</th><th>Rep</th><th class="money">ARR</th><th>Reason</th></tr></thead>
                <tbody>${top10NotInterested.map((a, i) => `<tr>
                  <td><span class="rk ${i < 3 ? 'rk-' + (i+1) : ''}">${i+1}</span></td>
                  <td><strong>${esc(a.name)}</strong></td>
                  <td style="font-size:12px;color:var(--slate-500);">${esc(a.rep)}</td>
                  <td class="money">${fmtMoney(a.arr)}</td>
                  <td><span class="pill pill-r">${esc(a.lastReason || '—')}</span></td>
                </tr>`).join('')}</tbody>
              </table>
            ` : '<div class="empty">No not-interested accounts yet</div>'}
          </div>
          <div class="scard" style="border-left:3px solid #f57c00;">
            <div class="sc-pill" style="background:#fff3e0;color:#e65100;">⚠ Would Not Engage</div>
            <div class="sc-stats">
              <div class="sc-stat"><div class="sv">${wneAccounts.length}</div><div class="sl">Accounts</div></div>
              <div class="sc-stat"><div class="sv">${fmtMoney(wneArr)}</div><div class="sl">Total ARR</div></div>
              <div class="sc-stat"><div class="sv">${pct(wneAccounts.length, totalAccounts)}%</div><div class="sl">of Total</div></div>
            </div>
            ${wneAccounts.length > 0 ? `
              <div style="font-size:12px;color:var(--slate-500);margin-top:8px;">Top reasons:</div>
              ${wneReasonsSorted.slice(0, 5).map(([r, c]) => bar(r, c, maxWneReason, '#f57c00')).join('')}
            ` : '<div class="empty">No would-not-engage accounts yet</div>'}
          </div>
        </div>

        <!-- Outcome Distribution -->
        <div class="card">
          <div class="card-hdr">
            <div class="card-icon" style="background:var(--blue-50);">📊</div>
            <h2>Outcome Distribution</h2>
          </div>
          ${outcomesSorted.length > 0
            ? outcomesSorted.map(([o, c]) => bar(o, c, maxOutcome, outcomeColors[o] || '#94a3b8')).join('')
            : '<div class="empty">No engagement data yet</div>'}
        </div>

        <!-- Top Reps -->
        <div class="card">
          <div class="card-hdr">
            <div class="card-icon" style="background:#fef3c7;">🏆</div>
            <h2>Top Reps by Points</h2>
          </div>
          ${topReps.length > 0 ? `
            <table class="tbl">
              <thead><tr><th></th><th>Rep</th><th class="r">Points</th><th class="r">Touches</th><th class="r">Accounts</th><th class="r">Interested</th><th class="r">Not Int.</th><th class="r">WNE</th></tr></thead>
              <tbody>${topReps.map((r, i) => `<tr>
                <td><span class="rk ${i < 3 ? 'rk-' + (i+1) : ''}">${i+1}</span></td>
                <td><strong>${esc(r.name)}</strong></td>
                <td class="r"><strong>${r.points}</strong></td>
                <td class="r">${r.engagements}</td>
                <td class="r">${r.accounts.size}</td>
                <td class="r" style="color:var(--green-600);">${r.interested}</td>
                <td class="r" style="color:var(--red-600);">${r.notInterested}</td>
                <td class="r" style="color:#f57c00;">${r.wouldNotEngage}</td>
              </tr>`).join('')}</tbody>
            </table>
          ` : '<div class="empty">No engagement data yet</div>'}
        </div>

        <!-- Untouched Accounts -->
        ${untouchedList.length > 0 ? `
        <div class="card" style="border-left:3px solid var(--amber-500);">
          <div class="card-hdr">
            <div class="card-icon" style="background:var(--amber-50);">⚠️</div>
            <h2>Untouched Accounts (${untouched})</h2>
            <span style="font-size:12px;color:var(--slate-400);margin-left:auto;">Sorted by ARR${playStartDate ? ' · Play since ' + playStartDate : ''}</span>
          </div>
          <table class="tbl">
            <thead><tr><th></th><th>Account</th><th>Assigned Rep</th><th class="money">ARR</th><th class="r">Days Waiting</th></tr></thead>
            <tbody>${untouchedList.slice(0, 20).map((a, i) => {
              const dw = playStartDate ? daysBetween(playStartDate, now.toISOString().split('T')[0]) : '—';
              return `<tr>
                <td>${i+1}</td>
                <td><strong>${esc(a.name)}</strong></td>
                <td style="font-size:12px;color:var(--slate-500);">${esc(a.rep)}</td>
                <td class="money">${fmtMoney(a.arr)}</td>
                <td class="r" style="color:${typeof dw === 'number' && dw > 14 ? 'var(--red-600)' : 'var(--amber-600)'};">${dw}</td>
              </tr>`;
            }).join('')}</tbody>
          </table>
          ${untouchedList.length > 20 ? `<div style="text-align:center;padding:8px;font-size:12px;color:var(--slate-400);">Showing 20 of ${untouchedList.length}</div>` : ''}
        </div>` : ''}

        <!-- Reasons — split by outcome, side by side -->
        <div class="split">
          <div class="scard sg">
            <div class="card-hdr">
              <div class="card-icon" style="background:var(--green-50);">💬</div>
              <h2 style="color:var(--green-700);">Why They Said Yes</h2>
            </div>
            ${intReasonsSorted.length > 0
              ? intReasonsSorted.map(([r, c]) => bar(r, c, maxIntReason, 'linear-gradient(90deg,#16a34a,#4ade80)')).join('')
              : '<div class="empty">No reasons recorded</div>'}
          </div>
          <div class="scard sr">
            <div class="card-hdr">
              <div class="card-icon" style="background:var(--red-50);">💬</div>
              <h2 style="color:var(--red-700);">Why They Said No</h2>
            </div>
            ${notIntReasonsSorted.length > 0
              ? notIntReasonsSorted.map(([r, c]) => bar(r, c, maxNotIntReason, 'linear-gradient(90deg,#dc2626,#f87171)')).join('')
              : '<div class="empty">No reasons recorded</div>'}
          </div>
        </div>
      `;

      document.getElementById('report-content').innerHTML = html;
    }

    // ─── CSV Export ───
    function exportCSV() {
      const playSelect = document.getElementById('play-select');
      const playName = playSelect.options[playSelect.selectedIndex]?.text || 'report';
      const logs = currentPlayLogs;
      const rows = [['Date', 'Rep', 'Account', 'Outcome', 'Reason', 'Notes', 'ARR']];

      // Build account ARR lookup from assignments
      const arrLookup = {};
      currentPlayAssignments.forEach(a => { if (a.account_id) arrLookup[a.account_id] = a.arr || ''; });

      logs.sort((a, b) => (b.submitted_at || '').localeCompare(a.submitted_at || '')).forEach(l => {
        rows.push([
          (l.call_date || l.submitted_at || '').split('T')[0],
          l.rep_name || l.rep_email,
          l.account_name || l.account_id,
          l.outcome,
          l.reason_label || '',
          l.notes || '',
          arrLookup[l.account_id] || ''
        ]);
      });

      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${playName.replace(/[^a-z0-9]/gi, '_')}_snapshot.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ─── Init ───
    async function loadReports() {
      showScreen('screen-loading');
      allPlays = await getPlays();
      const assText = await getFileText(SP_ROOT + '/assignments.json');
      allAssignments = assText ? (JSON.parse(assText).assignments || []).filter(a => a.active_flag !== false) : [];

      const sel = document.getElementById('play-select');
      sel.innerHTML = allPlays.map(p => `<option value="${p.play_id}">${p.play_name || p.play_id}</option>`).join('');

      if (allPlays.length > 0) {
        await loadPlayData(allPlays[0].play_id);
        renderSnapshot(allPlays[0].play_id);
      }
      showScreen('screen-reports');
    }

    // ─── Event Listeners ───
    document.getElementById('btn-sign-in').addEventListener('click', async () => {
      try {
        const account = await signIn();
        if (account) {
          currentUser = getCurrentUser();
          await loadReports();
        }
      } catch (err) {
        console.error('Sign in error:', err);
        if (err && err.message) alert('⚠️ Sign in failed.\n\n' + err.message);
      }
    });

    document.getElementById('play-select').addEventListener('change', async function () {
      if (!this.value) return;
      showScreen('screen-loading');
      await loadPlayData(this.value);
      renderSnapshot(this.value);
      showScreen('screen-reports');
    });

    document.getElementById('btn-export-csv').addEventListener('click', exportCSV);

    // Auth gate — only admin/manager roles can access reports
    const REPORT_ADMINS = {
      'langer@progress.com': true, 'philip.langer@progress.com': true,
      'planger@progress.com': true, 'phil.langer@progress.com': true,
      'kathleen.faria@progress.com': true, 'kfaria@progress.com': true,
      'k.faria@progress.com': true, 'kathy.faria@progress.com': true,
      'scheaney@progress.com': true,
    };

    // Auto-init
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await initAuth();
        const user = getCurrentUser();
        if (user) {
          const emails = user.emails || [user.email || ''];
          const hasAccess = emails.some(e => REPORT_ADMINS[e.toLowerCase()]);
          if (!hasAccess) {
            document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;">
              <div style="text-align:center;padding:40px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);max-width:400px;">
                <div style="font-size:48px;margin-bottom:16px;">🚫</div>
                <h2 style="color:#d32f2f;margin-bottom:8px;">Access Denied</h2>
                <p style="color:#666;">Reports require admin access.</p>
                <a href="app.html" style="display:inline-block;margin-top:20px;background:#0078d4;color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:600;">Go to Rep App</a>
              </div>
            </div>`;
            return;
          }
          currentUser = user;
          await loadReports();
        } else {
          showScreen('screen-login');
        }
      } catch (err) {
        console.error('Init error:', err);
        showScreen('screen-login');
      }
    });
  </script>
</body>
</html>
