<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chef SaaS Tracker - Setup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="setup-container">
    <h1 style="font-size:22px;font-weight:800;color:#0078d4;margin-bottom:16px;">Chef SaaS Tracker - One-Time Setup</h1>
    <div class="setup-warning">Run this once. Creates ChefSaaS/ folder in SharePoint Documents with seed data files. No special permissions needed.</div>
    <div id="section-signin">
      <p style="margin-bottom:16px;color:#555;font-size:15px;">Sign in with your Progress account to get started.</p>
      <button class="btn btn-primary" id="btn-sign-in">Sign in with Microsoft</button>
    </div>
    <div id="section-setup" style="display:none;">
      <div class="card" style="margin-bottom:16px;">
        <div style="font-size:13px;color:#666;margin-bottom:4px;">SharePoint site:</div>
        <div style="font-size:15px;font-weight:600;color:#0078d4;word-break:break-all;" id="site-url-display"></div>
        <div style="font-size:12px;color:#888;margin-top:4px;">Engagement data: Documents/ChefSaaS/chef-saas_engagements.csv</div>
      </div>
      <button class="btn btn-primary" id="btn-create-lists">Initialize Data Files</button>
      <div class="setup-log" id="setup-log" style="display:none;"></div>
    </div>
  </div>
  <script src="msal-browser.js"></script>
  <script src="config.js"></script>
  <script src="msal-auth.js"></script>
  <script src="graph-api.js"></script>
  <script>
    function log(icon, msg) {
      var el = document.getElementById("setup-log");
      el.style.display = "block";
      var item = document.createElement("div");
      item.className = "setup-log-item";
      item.textContent = icon + " " + msg;
      el.appendChild(item);
      item.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    async function runSetup() {
      var btn = document.getElementById("btn-create-lists");
      btn.disabled = true; btn.textContent = "Setting up...";
      document.getElementById("setup-log").innerHTML = "";
      try {
        log("...", "Connecting to SharePoint...");
        await getSiteId(); await getDriveId();
        log("OK", "SharePoint connected.");

        var pitch = "Hey [name] - quick question. Are you still running Chef on your own servers? Most customers tell us the same thing: the tool works, but managing the infrastructure around it is a constant drain. We built Chef SaaS to take all of that off your plate. Would it be worth 20 minutes to see if that math works for your environment?";

        log("...", "Creating assignments.json...");
        await writeJsonFile("assignments.json", { assignments: [
          { play_id:"chef-saas", play_name:"Chef SaaS", account_id:"acc-001", account_name:"Acme Corp",             rep_email:"rich.martinez@progress.com", rep_name:"Rich Martinez", elevator_pitch:pitch, icp:"Existing on-prem Chef customers", target_persona:"Director of IT Ops", response_set_id:"SAAS_STANDARD", priority:"High", active_flag:true },
          { play_id:"chef-saas", play_name:"Chef SaaS", account_id:"acc-002", account_name:"Stratosphere Cloud Co.", rep_email:"rich.martinez@progress.com", rep_name:"Rich Martinez", elevator_pitch:pitch, icp:"Existing on-prem Chef customers", target_persona:"Director of IT Ops", response_set_id:"SAAS_STANDARD", priority:"High", active_flag:true },
          { play_id:"chef-saas", play_name:"Chef SaaS", account_id:"acc-003", account_name:"Ironclad Systems",       rep_email:"rob.kelly@progress.com",    rep_name:"Rob Kelly",    elevator_pitch:pitch, icp:"Existing on-prem Chef customers", target_persona:"VP Engineering",   response_set_id:"SAAS_STANDARD", priority:"High", active_flag:true },
          { play_id:"chef-saas", play_name:"Chef SaaS", account_id:"acc-004", account_name:"Meridian Data Labs",     rep_email:"rob.kelly@progress.com",    rep_name:"Rob Kelly",    elevator_pitch:pitch, icp:"Existing on-prem Chef customers", target_persona:"VP Engineering",   response_set_id:"SAAS_STANDARD", priority:"High", active_flag:true },
          { play_id:"chef-saas", play_name:"Chef SaaS", account_id:"acc-005", account_name:"Apex Technology Group",  rep_email:"nick.russo@progress.com",   rep_name:"Nick Russo",   elevator_pitch:pitch, icp:"Existing on-prem Chef customers", target_persona:"CTO",             response_set_id:"SAAS_STANDARD", priority:"High", active_flag:true }
        ]});
        log("OK", "assignments.json created (replace with your full account list via DEMO-ingest.html).");

        log("...", "Creating response-options.json...");
        await writeJsonFile("response-options.json", { options: [
          { response_set_id:"SAAS_STANDARD", outcome_type:"Interested",     reason_code:"FOLLOW_UP",      reason_label:"Wants follow-up conversation",  sort_order:1, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Interested",     reason_code:"COST_VALUE",     reason_label:"Pricing / performance value",    sort_order:2, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Interested",     reason_code:"SAAS_FLEX",      reason_label:"SaaS flexibility",              sort_order:3, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Interested",     reason_code:"OPS_EFFICIENCY", reason_label:"Operational efficiency",         sort_order:4, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Interested",     reason_code:"SIMPLIFY",       reason_label:"Simplify upgrade path",         sort_order:5, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Interested",     reason_code:"BETTER_SUPPORT", reason_label:"Better support model",          sort_order:6, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Not Interested", reason_code:"CANNOT_SAAS",    reason_label:"Cannot do SaaS",                sort_order:1, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Not Interested", reason_code:"NO_PAIN",        reason_label:"No current pain",               sort_order:2, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Not Interested", reason_code:"BAD_TIMING",     reason_label:"Bad timing",                    sort_order:3, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Not Interested", reason_code:"BUDGET",         reason_label:"Budget issue",                  sort_order:4, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Not Interested", reason_code:"SOLVED",         reason_label:"Already solved elsewhere",       sort_order:5, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Not Interested", reason_code:"SECURITY",       reason_label:"Security / compliance concern",  sort_order:6, active_flag:true },
          { response_set_id:"SAAS_STANDARD", outcome_type:"Not Interested", reason_code:"WRONG_CONTACT",  reason_label:"No authority / wrong contact",   sort_order:7, active_flag:true }
        ]});
        log("OK", "response-options.json created.");

        log("DONE", "Setup complete! Share this URL with reps: " + CONFIG.sharepointSiteUrl.replace(/\/$/, "") + "/Shared%20Documents/chef-saas-tracker/app.html");
        log("INFO", "Engagement data will appear in SharePoint > Documents > ChefSaaS > chef-saas_engagements.csv");
        log("INFO", "Open that CSV in Excel anytime to see all rep activity.");
        btn.textContent = "Setup Complete";
      } catch(err) {
        log("ERROR", "Setup failed: " + err.message);
        btn.disabled = false; btn.textContent = "Retry";
        console.error(err);
      }
    }

    document.getElementById("btn-sign-in").addEventListener("click", async function() {
      try {
        var account = await signIn();
        if (account) {
          document.getElementById("section-signin").style.display = "none";
          document.getElementById("section-setup").style.display = "block";
          document.getElementById("site-url-display").textContent = CONFIG.sharepointSiteUrl;
        }
      } catch(err) { alert("Sign in failed: " + (err.message || err)); }
    });

    document.getElementById("btn-create-lists").addEventListener("click", runSetup);

    (async function() {
      try {
        var account = await initAuth();
        if (account) {
          document.getElementById("section-signin").style.display = "none";
          document.getElementById("section-setup").style.display = "block";
          document.getElementById("site-url-display").textContent = CONFIG.sharepointSiteUrl;
        }
      } catch(err) { console.error("Auth init:", err); }
    })();
  </script>
</body>
</html>
